services:
  athletiqly:
    image: athletiqly
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://user:password@pgbouncer:6432/athletiqly_db?pgbouncer=true
      - REDIS_URL=redis://redis:6379
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - athletiqly-network

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: athletiqly_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - athletiqly-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d athletiqly_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:1.18.0
    environment:
      DB_USER: user
      DB_PASSWORD: password
      DB_HOST: postgres
      DB_NAME: athletiqly_db
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      MAX_DB_CONNECTIONS: 50
      SERVER_RESET_QUERY: DISCARD ALL
      SERVER_RESET_QUERY_ALWAYS: 1
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - athletiqly-network

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - athletiqly-network

volumes:
  postgres_data:
  redis_data:

networks:
  athletiqly-network:
    driver: bridge